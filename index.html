<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>fumib Navi</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:sans-serif;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
height:100vh;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:14px;
width:260px;
z-index:10;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}

input{
width:100%;
padding:6px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:8px;
border-radius:20px;
border:none;
background:#1976d2;
color:white;
font-weight:bold;
cursor:pointer;
}

#navinfo{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#1976d2;
color:white;
padding:14px;
font-size:18px;
z-index:9;
}

.round{
position:absolute;
right:15px;
width:55px;
height:55px;
border-radius:50%;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,.4);
font-weight:bold;
background:white;
cursor:pointer;
}

#compass{bottom:90px;font-size:22px}
#view{bottom:20px}
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
<input id="dest" placeholder="目的地（住所/店舗名）">
<button onclick="startNav()">案内開始</button>
</div>

<div id="navinfo">目的地を入力してください</div>

<button id="compass" class="round">🧭</button>
<button id="view" class="round">2D</button>

<script>

let map=new maplibregl.Map({
container:'map',
style:'https://tiles.openfreemap.org/styles/bright',
center:[139.767,35.681],
zoom:15,
pitch:0
});

let userPos=null;
let marker=null;
let routeData=null;
let steps=[];
let currentStep=0;
let lastDistance=Infinity;
let northMode=true;
let is3D=false;

function arrow(){
let el=document.createElement("div");
el.innerHTML=`<svg width="40" height="40" viewBox="0 0 24 24">
<path d="M12 2 L22 22 L12 17 L2 22 Z"
fill="#1976d2" stroke="white" stroke-width="1"/></svg>`;
return el;
}

function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="ja-JP";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

navigator.geolocation.watchPosition(pos=>{

let speed=pos.coords.speed||0;
if(speed<0.8) return;

userPos=[pos.coords.longitude,pos.coords.latitude];

if(!marker){
marker=new maplibregl.Marker({element:arrow()})
.setLngLat(userPos)
.addTo(map);
map.setCenter(userPos);
}else{
marker.setLngLat(userPos);
}

if(!northMode && pos.coords.heading!=null){
map.easeTo({bearing:pos.coords.heading,duration:300});
}

updateNav();

});

async function startNav(){

if(!userPos){alert("GPS取得中");return;}

let addr=document.getElementById("dest").value;
if(!addr){alert("目的地入力");return;}

let geo=await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr)
);
let g=await geo.json();
if(!g.length){alert("住所見つからない");return;}

let dest=[parseFloat(g[0].lon),parseFloat(g[0].lat)];

let res=await fetch(
"https://router.project-osrm.org/route/v1/driving/"
+userPos.join(",")+";"+dest.join(",")
+"?overview=full&steps=true&geometries=geojson"
);

routeData=await res.json();
if(!routeData.routes){alert("ルート失敗");return;}

steps=routeData.routes[0].legs[0].steps;
currentStep=0;
lastDistance=Infinity;

drawRoute(routeData.routes[0].geometry.coordinates);

let min=Math.round(routeData.routes[0].duration/60);
document.getElementById("navinfo").innerHTML=
"所要時間 約"+min+"分";

speak("案内を開始します");

}

function drawRoute(coords){

if(!map.isStyleLoaded()){
setTimeout(()=>drawRoute(coords),500);
return;
}

if(map.getSource("route")){
map.getSource("route").setData({
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
});
}else{
map.addSource("route",{type:"geojson",data:{
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
}});
map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{'line-color':'#1976d2','line-width':6}
});
}
}

function updateNav(){

if(!steps.length||!userPos) return;

let step=steps[currentStep];
let end=step.maneuver.location;

let dx=end[0]-userPos[0];
let dy=end[1]-userPos[1];
let dist=Math.sqrt(dx*dx+dy*dy)*111000;

if(dist>lastDistance) return;
lastDistance=dist;

let dir="直進";
if(step.maneuver.modifier=="right") dir="右折";
if(step.maneuver.modifier=="left") dir="左折";

document.getElementById("navinfo").innerHTML=
Math.round(dist)+"m先 "+dir;

if(dist<200&&!step.announced){
speak("200メートル先 "+dir);
step.announced=true;
}

if(dist<15){
currentStep++;
lastDistance=Infinity;
if(currentStep>=steps.length){
speak("到着しました");
document.getElementById("navinfo").innerHTML="到着しました";
steps=[];
}
}
}

document.getElementById("compass").onclick=()=>{
northMode=!northMode;
if(northMode) map.setBearing(0);
};

document.getElementById("view").onclick=()=>{
is3D=!is3D;
if(is3D){
map.easeTo({pitch:60});
document.getElementById("view").innerText="3D";
}else{
map.easeTo({pitch:0});
document.getElementById("view").innerText="2D";
}
};

</script>
</body>
</html>
