<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>fumib Navi</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
html,body{margin:0;padding:0;height:100%;}
#map{position:absolute;top:0;bottom:0;width:100%;}
#panel{
position:absolute;top:10px;left:10px;
background:white;padding:12px;border-radius:12px;
z-index:10;width:260px;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}
input{width:100%;padding:6px;margin-bottom:6px;}
button{width:100%;padding:8px;border:none;border-radius:20px;background:#1976d2;color:white;}
.round{
position:absolute;right:15px;width:55px;height:55px;
border-radius:50%;border:none;background:white;
box-shadow:0 4px 10px rgba(0,0,0,.4);font-size:20px;
}
#locate{bottom:20px;}
#navinfo{
position:absolute;bottom:0;left:0;width:100%;
background:#1976d2;color:white;padding:14px;font-size:18px;
}
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
<input id="dest" placeholder="目的地（住所）">
<button id="startBtn" onclick="startNav()" disabled>GPS取得中...</button>
</div>

<div id="navinfo">GPSを取得しています...</div>

<button id="locate" class="round">📍</button>

<script>

let map = new maplibregl.Map({
container:'map',
style:{
"version":8,
"sources":{
"osm":{
"type":"raster",
"tiles":[
"https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
"https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
],
"tileSize":256
}
},
"layers":[{"id":"osm","type":"raster","source":"osm"}]
},
center:[139.767,35.681],
zoom:14
});

let userPos=null;
let marker=null;
let heading=0;

function createArrow(){
let el=document.createElement("div");
el.style.width="30px";
el.style.height="30px";
el.style.background="#1976d2";
el.style.clipPath="polygon(50% 0%, 100% 100%, 50% 75%, 0% 100%)";
el.style.transformOrigin="center";
return el;
}

let arrowEl=createArrow();

navigator.geolocation.watchPosition(pos=>{

userPos=[pos.coords.longitude,pos.coords.latitude];
heading=pos.coords.heading||heading;

if(!marker){
marker=new maplibregl.Marker({element:arrowEl})
.setLngLat(userPos)
.addTo(map);
}else{
marker.setLngLat(userPos);
}

arrowEl.style.transform="rotate("+heading+"deg)";

map.setCenter(userPos);

document.getElementById("startBtn").disabled=false;
document.getElementById("startBtn").innerText="案内開始";
document.getElementById("navinfo").innerText="目的地を入力してください";

},{enableHighAccuracy:true});

document.getElementById("locate").onclick=()=>{
if(userPos){
map.flyTo({center:userPos,zoom:16});
}
};

async function startNav(){

if(!userPos){alert("GPSまだ取得できていません");return;}

let addr=document.getElementById("dest").value;
if(!addr){alert("目的地入力");return;}

document.getElementById("navinfo").innerText="ルート取得中...";

let geo=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr));
let g=await geo.json();
if(!g.length){alert("住所見つからない");return;}

let dest=[parseFloat(g[0].lon),parseFloat(g[0].lat)];

let res=await fetch(
"https://router.project-osrm.org/route/v1/driving/"
+userPos.join(",")+";"+dest.join(",")
+"?overview=full&geometries=geojson"
);

let data=await res.json();
if(!data.routes){alert("ルート取得失敗");return;}

let coords=data.routes[0].geometry.coordinates;

if(map.getSource("route")){
map.getSource("route").setData({
"type":"Feature",
"geometry":{"type":"LineString","coordinates":coords}
});
}else{
map.addSource("route",{
"type":"geojson",
"data":{"type":"Feature","geometry":{"type":"LineString","coordinates":coords}}
});
map.addLayer({
"id":"route",
"type":"line",
"source":"route",
"paint":{"line-color":"#1976d2","line-width":6}
});
}

let min=Math.round(data.routes[0].duration/60);
document.getElementById("navinfo").innerText="所要時間 約"+min+"分";

}

</script>
</body>
</html>
