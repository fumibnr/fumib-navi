<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>fumib Ultimate Navi</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
html,body{margin:0;height:100%}
#map{position:absolute;top:0;bottom:0;width:100%}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:14px;
width:260px;
z-index:10;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}

input{
width:100%;
padding:6px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:8px;
border-radius:20px;
border:none;
background:#1976d2;
color:white;
font-weight:bold;
}

#info{
margin-top:8px;
font-size:14px;
}

.round{
position:absolute;
right:15px;
width:55px;
height:55px;
border-radius:50%;
border:none;
box-shadow:0 4px 10px rgba(0,0,0,.4);
font-weight:bold;
}

#compass{bottom:90px;background:white;font-size:22px}
#view{bottom:20px;background:white}
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
<input id="dest" placeholder="目的地（住所/店舗名）">
<button onclick="startNav()">案内開始</button>
<div id="info"></div>
</div>

<button id="compass" class="round">🧭</button>
<button id="view" class="round">2D</button>

<script>

let map=new maplibregl.Map({
container:'map',
style:'https://demotiles.maplibre.org/style.json',
center:[139.767,35.681],
zoom:15,
pitch:0
});

let userPos=null;
let marker;
let routeData=null;
let steps=[];
let currentStep=0;
let northMode=true;
let is3D=false;

function arrow(){
let el=document.createElement("div");
el.innerHTML=`<svg width="40" height="40" viewBox="0 0 24 24">
<path d="M12 2 L22 22 L12 17 L2 22 Z"
fill="#1976d2" stroke="white" stroke-width="1"/></svg>`;
return el;
}

function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="ja-JP";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

navigator.geolocation.watchPosition(pos=>{
userPos=[pos.coords.longitude,pos.coords.latitude];

if(!marker){
marker=new maplibregl.Marker({element:arrow()})
.setLngLat(userPos)
.addTo(map);
map.setCenter(userPos);
}else{
marker.setLngLat(userPos);

if(!northMode && pos.coords.heading!=null){
map.easeTo({
bearing:pos.coords.heading,
center:userPos,
duration:300
});
}
}

autoZoom(pos.coords.speed);
updateNav();
});

function autoZoom(speed){
if(!speed) return;
let z=15;
if(speed>20) z=17;
if(speed>50) z=18;
map.setZoom(z);
}

async function startNav(){

if(!userPos){alert("GPS取得中");return;}

let addr=document.getElementById("dest").value;
if(!addr){alert("目的地入力");return;}

let geo=await fetch(
"https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr)
);
let g=await geo.json();
if(!g.length){alert("住所見つからない");return;}

let dest=[parseFloat(g[0].lon),parseFloat(g[0].lat)];

let res=await fetch(
"https://router.project-osrm.org/route/v1/driving/"
+userPos.join(",")+";"+dest.join(",")
+"?overview=full&steps=true&geometries=geojson"
);

routeData=await res.json();
if(!routeData.routes){alert("ルート失敗");return;}

steps=routeData.routes[0].legs[0].steps;
currentStep=0;

let duration=Math.round(routeData.routes[0].duration/60);
document.getElementById("info").innerHTML=
"所要時間：約"+duration+"分";

drawRoute(routeData.routes[0].geometry.coordinates);

speak("案内を開始します");
}

function drawRoute(coords){

if(map.getSource("route")){
map.getSource("route").setData({
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
});
}else{
map.addSource("route",{type:"geojson",data:{
type:"Feature",
geometry:{type:"LineString",coordinates:coords}
}});
map.addLayer({
id:"route",
type:"line",
source:"route",
paint:{'line-color':'#1976d2','line-width':6}
});
}
}

function updateNav(){

if(!steps.length || !userPos) return;

let step=steps[currentStep];
let end=step.maneuver.location;

let dx=end[0]-userPos[0];
let dy=end[1]-userPos[1];
let dist=Math.sqrt(dx*dx+dy*dy)*111000;

let remain=routeData.routes[0].distance;

let dirText="";
if(step.maneuver.modifier=="right") dirText="→ 右折";
else if(step.maneuver.modifier=="left") dirText="← 左折";
else dirText="直進";

document.getElementById("info").innerHTML=
Math.round(dist)+"m先 "+dirText+
"<br>残り約"+Math.round(remain/1000)+"km";

if(dist<200 && !step.announced){
speak("200メートル先 "+dirText);
step.announced=true;
}

if(dist<20){
currentStep++;
if(currentStep>=steps.length){
speak("到着しました");
steps=[];
}
}
}

document.getElementById("compass").onclick=()=>{
northMode=!northMode;
if(northMode) map.setBearing(0);
};

document.getElementById("view").onclick=()=>{
is3D=!is3D;
if(is3D){
map.easeTo({pitch:60});
document.getElementById("view").innerText="3D";
}else{
map.easeTo({pitch:0});
document.getElementById("view").innerText="2D";
}
};

</script>
</body>
</html>
